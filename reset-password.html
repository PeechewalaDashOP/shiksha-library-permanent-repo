<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset Password – Shiksha Library</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Inter',sans-serif;background:#0f172a;min-height:100vh;display:flex;align-items:center;justify-content:center;color:#1e293b}
  .box{background:#1e293b;border-radius:16px;padding:2rem;width:340px;color:#fff}
  .box h2{font-size:1.2rem;font-weight:700;margin-bottom:.25rem}
  .box p{color:#94a3b8;font-size:.85rem;margin-bottom:1.5rem}
  .box input{width:100%;padding:.65rem .9rem;background:#0f172a;border:1.5px solid #334155;border-radius:8px;color:#fff;font-size:.9rem;margin-bottom:.75rem;font-family:inherit;outline:none}
  .box input:focus{border-color:#f59e0b}
  .box button{width:100%;padding:.75rem;background:#f59e0b;border:none;color:#fff;border-radius:8px;font-weight:700;cursor:pointer;font-family:inherit;font-size:.95rem}
  .box button:disabled{background:#fcd34d;cursor:not-allowed}
  .msg{font-size:.85rem;margin-bottom:.75rem;display:none;padding:.6rem .8rem;border-radius:8px}
  .msg.error{background:#3f1d1d;color:#fca5a5;display:block}
  .msg.success{background:#1d3f2a;color:#86efac;display:block}
  .msg.info{background:#1e2c3f;color:#93c5fd;display:block}
</style>
</head>
<body>

<div class="box">
  <h2>Set New Password</h2>
  <p>Shiksha Library — Admin Account</p>

  <div class="msg" id="msg"></div>

  <input type="password" id="new-pwd" placeholder="New password (min 6 characters)">
  <input type="password" id="confirm-pwd" placeholder="Confirm new password">
  <button onclick="updatePassword()" id="submit-btn">Update Password</button>
</div>

<script>
const SUPABASE_URL      = "https://ojmxqckunnpthgftwbkq.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_j8mlu6_1po8jUo3k5tpMrw_l7Wq74VS";
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const msg = document.getElementById("msg");

function showMsg(text, type) {
  msg.textContent = text;
  msg.className = "msg " + type;
}

// Supabase automatically picks up the access_token from the URL hash
// and creates a recovery session when this page loads.
(async () => {
  const { data, error } = await sb.auth.getSession();
  if (error || !data.session) {
    showMsg("Invalid or expired reset link. Please request a new password reset email.", "error");
    document.getElementById("submit-btn").disabled = true;
    document.getElementById("new-pwd").disabled = true;
    document.getElementById("confirm-pwd").disabled = true;
  } else {
    showMsg("Reset link verified. Enter your new password below.", "info");
  }
})();

async function updatePassword() {
  const pwd = document.getElementById("new-pwd").value;
  const confirm = document.getElementById("confirm-pwd").value;
  const btn = document.getElementById("submit-btn");

  if (pwd.length < 6) {
    showMsg("Password must be at least 6 characters.", "error");
    return;
  }
  if (pwd !== confirm) {
    showMsg("Passwords do not match.", "error");
    return;
  }

  btn.disabled = true;
  btn.textContent = "Updating...";

  const { error } = await sb.auth.updateUser({ password: pwd });

  if (error) {
    showMsg("Error: " + error.message, "error");
    btn.disabled = false;
    btn.textContent = "Update Password";
  } else {
    showMsg("✅ Password updated successfully! You can now login with your new password.", "success");
    btn.textContent = "Done";
    setTimeout(() => { window.location.href = "admin.html"; }, 2500);
  }
}
</script>
</body>
</html>
