<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Login – Shiksha Library</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Inter',sans-serif;background:linear-gradient(135deg,#0f172a 0%,#1e293b 50%,#0f172a 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1rem}
  .card{background:#fff;border-radius:20px;padding:2.5rem;width:100%;max-width:420px;box-shadow:0 30px 80px rgba(0,0,0,0.4)}
  .logo-row{text-align:center;margin-bottom:2rem}
  .logo-row img{height:52px;border-radius:10px;margin-bottom:.75rem}
  .logo-row h1{font-size:1.5rem;font-weight:800;color:#1e293b}
  .logo-row p{color:#64748b;font-size:.9rem;margin-top:.25rem}
  .tabs{display:flex;background:#f1f5f9;border-radius:10px;padding:4px;margin-bottom:1.75rem}
  .tab{flex:1;text-align:center;padding:.6rem;border-radius:7px;font-size:.9rem;font-weight:600;cursor:pointer;color:#64748b;transition:all .2s}
  .tab.active{background:#fff;color:#f59e0b;box-shadow:0 2px 8px rgba(0,0,0,0.1)}
  .form-group{margin-bottom:1.1rem}
  .form-group label{display:block;font-size:.85rem;font-weight:600;color:#374151;margin-bottom:.4rem}
  .form-group input{width:100%;padding:.7rem 1rem;border:1.5px solid #e2e8f0;border-radius:9px;font-size:.95rem;outline:none;transition:border .2s;font-family:inherit}
  .form-group input:focus{border-color:#f59e0b;box-shadow:0 0 0 3px rgba(245,158,11,.1)}
  .btn{width:100%;padding:.85rem;background:#f59e0b;color:#fff;border:none;border-radius:10px;font-size:1rem;font-weight:700;cursor:pointer;transition:background .2s;font-family:inherit;margin-top:.25rem}
  .btn:hover{background:#d97706}
  .btn:disabled{background:#fcd34d;cursor:not-allowed}
  .error{color:#dc2626;font-size:.85rem;margin-top:.6rem;text-align:center;background:#fef2f2;padding:.5rem .75rem;border-radius:7px;display:none}
  .success{color:#15803d;font-size:.85rem;margin-top:.6rem;text-align:center;background:#f0fdf4;padding:.5rem .75rem;border-radius:7px;display:none}
  .back-link{text-align:center;margin-top:1.5rem;font-size:.85rem;color:#64748b}
  .back-link a{color:#f59e0b;font-weight:600;text-decoration:none}
  .forgot{text-align:right;font-size:.8rem;margin-top:.3rem}
  .forgot a{color:#f59e0b;text-decoration:none;font-weight:500}
  .panel{display:none}
  .panel.active{display:block}
</style>
</head>
<body>
<div class="card">
  <div class="logo-row">
    <img src="assets/shiksha-library-logo.jpeg" alt="Shiksha Library" onerror="this.style.display='none'">
    <h1>Shiksha Library</h1>
    <p>Student Portal — Kota, Rajasthan</p>
  </div>

  <div class="tabs">
    <div class="tab active" onclick="switchTab('login')">Login</div>
    <div class="tab" onclick="switchTab('reset')">Forgot Password</div>
  </div>

  <!-- LOGIN PANEL -->
  <div class="panel active" id="panel-login">
    <div class="form-group">
      <label>Email Address</label>
      <input type="email" id="login-email" placeholder="your@email.com">
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="login-pwd" placeholder="Your phone number (default)">
      <div class="forgot"><a href="#" onclick="switchTab('reset')">Forgot password?</a></div>
    </div>
    <div class="error" id="login-error"></div>
    <button class="btn" id="login-btn" onclick="doLogin()">Login to My Account</button>
    <p style="text-align:center;font-size:.8rem;color:#94a3b8;margin-top:.75rem">Default password = your registered phone number</p>
  </div>

  <!-- RESET PASSWORD PANEL -->
  <div class="panel" id="panel-reset">
    <p style="color:#64748b;font-size:.9rem;margin-bottom:1.25rem">Enter your registered email and we'll send a password reset link.</p>
    <div class="form-group">
      <label>Email Address</label>
      <input type="email" id="reset-email" placeholder="your@email.com">
    </div>
    <div class="error" id="reset-error"></div>
    <div class="success" id="reset-success"></div>
    <button class="btn" id="reset-btn" onclick="doReset()">Send Reset Link</button>
  </div>

  <div class="back-link">
    <a href="index.html">← Back to Shiksha Library</a>
  </div>
</div>

<script>
// ── CONFIG ── Replace with your keys
const SUPABASE_URL = "https://ojmxqckunnpthgftwbkq.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_j8mlu6_1po8jUo3k5tpMrw_l7Wq74VS";
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// Redirect if already logged in
sb.auth.getSession().then(({ data }) => {
  if (data.session) window.location.href = "dashboard.html";
});

function switchTab(tab) {
  document.querySelectorAll(".tab").forEach((t,i) => t.classList.toggle("active", (i===0&&tab==="login")||(i===1&&tab==="reset")));
  document.querySelectorAll(".panel").forEach(p => p.classList.remove("active"));
  document.getElementById("panel-" + tab).classList.add("active");
}

async function doLogin() {
  const email = document.getElementById("login-email").value.trim();
  const pwd   = document.getElementById("login-pwd").value;
  const err   = document.getElementById("login-error");
  const btn   = document.getElementById("login-btn");
  err.style.display = "none";
  if (!email || !pwd) { showError(err, "Please fill in all fields."); return; }
  btn.textContent = "Logging in..."; btn.disabled = true;
  const { error } = await sb.auth.signInWithPassword({ email, password: pwd });
  if (error) { showError(err, "Invalid email or password. Your default password is your phone number."); btn.textContent = "Login to My Account"; btn.disabled = false; }
  else window.location.href = "dashboard.html";
}

async function doReset() {
  const email = document.getElementById("reset-email").value.trim();
  const err   = document.getElementById("reset-error");
  const suc   = document.getElementById("reset-success");
  const btn   = document.getElementById("reset-btn");
  err.style.display = "none"; suc.style.display = "none";
  if (!email) { showError(err, "Please enter your email."); return; }
  btn.textContent = "Sending..."; btn.disabled = true;
  const { error } = await sb.auth.resetPasswordForEmail(email, { redirectTo: window.location.origin + "/dashboard.html" });
  if (error) showError(err, error.message);
  else { suc.textContent = "Reset link sent! Check your email inbox."; suc.style.display = "block"; }
  btn.textContent = "Send Reset Link"; btn.disabled = false;
}

function showError(el, msg) { el.textContent = msg; el.style.display = "block"; }

document.addEventListener("keydown", e => { if (e.key === "Enter") doLogin(); });
</script>
</body>
</html>
